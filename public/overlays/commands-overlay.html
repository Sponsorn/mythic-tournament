<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M+ Tournament - Commands</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    html, body {
      width: 576px;
      height: 108px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    .commands-box {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      border: 2px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .progress-header {
      background: var(--bg-tertiary);
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-time {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .progress-time.countdown {
      color: var(--accent-gold);
    }

    .progress-time.break {
      color: var(--accent-orange, #ff9500);
    }

    .progress-time.ended {
      color: var(--accent-green);
    }

    .progress-bar-container {
      position: relative;
      width: 100%;
      height: 12px;
      background: var(--bg-primary);
      border-radius: 6px;
      overflow: visible;
    }

    .progress-bar-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-secondary);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple, #a855f7));
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .progress-bar-fill.countdown {
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-orange, #ff9500));
    }

    .break-marker {
      position: absolute;
      top: -2px;
      width: 3px;
      height: 16px;
      background: var(--accent-orange, #ff9500);
      border-radius: 2px;
      z-index: 2;
    }

    .break-marker::after {
      content: 'BREAK';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      font-weight: 700;
      color: var(--accent-orange, #ff9500);
      white-space: nowrap;
    }

    .break-zone {
      position: absolute;
      top: 0;
      height: 100%;
      background: rgba(255, 149, 0, 0.3);
      border-left: 2px solid var(--accent-orange, #ff9500);
      border-right: 2px solid var(--accent-orange, #ff9500);
    }

    .time-markers {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
    }

    .time-marker {
      font-size: 9px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .commands-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      gap: 24px;
    }

    .command {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .command-name {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-blue);
      background: rgba(var(--accent-blue-rgb), 0.15);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(var(--accent-blue-rgb), 0.3);
    }

    .command-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .separator {
      width: 1px;
      height: 24px;
      background: var(--border-subtle);
    }
  </style>
</head>
<body>
  <div class="commands-box">
    <div class="progress-header">
      <div class="progress-info">
        <span class="progress-label" id="progressLabel">Tournament Starts In</span>
        <span class="progress-time countdown" id="progressTime">--:--</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill countdown" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="break-zone" id="breakZone" style="display: none;"></div>
        <div class="break-marker" id="breakMarker" style="display: none;"></div>
      </div>
    </div>
    <div class="commands-body">
      <div class="command">
        <span class="command-name">!tournament</span>
        <span class="command-desc">Info</span>
      </div>
      <div class="separator"></div>
      <div class="command">
        <span class="command-name">!guild</span>
        <span class="command-desc">About us</span>
      </div>
      <div class="separator"></div>
      <div class="command">
        <span class="command-name">!join</span>
        <span class="command-desc">How to join</span>
      </div>
    </div>
  </div>

  <script>
    // Schedule loaded from runtime config API
    let TOURNAMENT_START = null;
    let TOURNAMENT_END = null;
    let BREAK_START = null;
    let BREAK_END = null;

    // Elements
    const progressLabel = document.getElementById('progressLabel');
    const progressTime = document.getElementById('progressTime');
    const progressFill = document.getElementById('progressFill');
    const breakMarker = document.getElementById('breakMarker');
    const breakZone = document.getElementById('breakZone');

    function formatCountdown(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours > 0) {
        return `${hours}h ${minutes.toString().padStart(2, '0')}m`;
      }
      if (minutes >= 10) {
        return `${minutes}m`;
      }
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function loadSchedule() {
      fetch('/api/runtime-config')
        .then(res => res.json())
        .then(cfg => {
          if (cfg.eventStartSE) TOURNAMENT_START = new Date(cfg.eventStartSE);
          if (cfg.eventEndSE) TOURNAMENT_END = new Date(cfg.eventEndSE);
          if (cfg.breakStartSE) BREAK_START = new Date(cfg.breakStartSE);
          if (cfg.breakEndSE) BREAK_END = new Date(cfg.breakEndSE);
        })
        .catch(err => console.warn('Failed to load schedule:', err));
    }

    function hasBreak() {
      return BREAK_START && BREAK_END && BREAK_START < BREAK_END;
    }

    function updateProgress() {
      const now = new Date();

      if (!TOURNAMENT_START || !TOURNAMENT_END) {
        progressLabel.textContent = 'Schedule Not Set';
        progressTime.textContent = '--:--';
        progressTime.className = 'progress-time';
        progressFill.style.width = '0%';
        breakMarker.style.display = 'none';
        breakZone.style.display = 'none';
        return;
      }

      const totalDurationMs = TOURNAMENT_END - TOURNAMENT_START;

      // Before tournament starts - countdown mode
      if (now < TOURNAMENT_START) {
        const remaining = TOURNAMENT_START - now;
        progressLabel.textContent = 'Tournament Starts In';
        progressTime.textContent = formatCountdown(remaining);
        progressTime.className = 'progress-time countdown';
        progressFill.className = 'progress-bar-fill countdown';

        const sixHours = 6 * 60 * 60 * 1000;
        const countdownProgress = Math.max(0, (sixHours - remaining) / sixHours * 100);
        progressFill.style.width = `${countdownProgress}%`;

        breakMarker.style.display = 'none';
        breakZone.style.display = 'none';
        return;
      }

      // After tournament ends
      if (now >= TOURNAMENT_END) {
        progressLabel.textContent = 'Tournament Complete';
        progressTime.textContent = 'GG!';
        progressTime.className = 'progress-time ended';
        progressFill.className = 'progress-bar-fill';
        progressFill.style.width = '100%';
        progressFill.style.background = 'linear-gradient(90deg, var(--accent-green), var(--accent-blue))';
        breakMarker.style.display = 'none';
        breakZone.style.display = 'none';
        return;
      }

      // During tournament - show progress to end
      const elapsed = now - TOURNAMENT_START;
      const progress = (elapsed / totalDurationMs) * 100;
      progressFill.className = 'progress-bar-fill';
      progressFill.style.width = `${Math.min(100, progress)}%`;

      // Break markers
      if (hasBreak()) {
        const breakStartPercent = ((BREAK_START - TOURNAMENT_START) / totalDurationMs) * 100;
        const breakEndPercent = ((BREAK_END - TOURNAMENT_START) / totalDurationMs) * 100;

        breakMarker.style.display = 'block';
        breakMarker.style.left = `${breakStartPercent}%`;
        breakZone.style.display = 'block';
        breakZone.style.left = `${breakStartPercent}%`;
        breakZone.style.width = `${breakEndPercent - breakStartPercent}%`;

        // During break
        if (now >= BREAK_START && now < BREAK_END) {
          const breakRemaining = BREAK_END - now;
          progressLabel.textContent = 'Break - Resumes In';
          progressTime.textContent = formatCountdown(breakRemaining);
          progressTime.className = 'progress-time break';
          return;
        }
      } else {
        breakMarker.style.display = 'none';
        breakZone.style.display = 'none';
      }

      // Normal tournament time - show remaining
      const remaining = TOURNAMENT_END - now;
      progressLabel.textContent = 'Last Run Must Start By';
      progressTime.textContent = formatCountdown(remaining);
      progressTime.className = 'progress-time';
    }

    // Load schedule then start ticking
    loadSchedule();
    updateProgress();
    setInterval(updateProgress, 1000);
    // Re-fetch schedule periodically in case admin changes it
    setInterval(loadSchedule, 30000);
  </script>
</body>
</html>
